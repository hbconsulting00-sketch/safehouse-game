<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הבית הבטוח | מנחה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;800;900&family=Secular+One&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--or:#FF6B00;--orl:#FF9A3C;--og:rgba(255,107,0,.4);--pm:#9333EA;--pl:#C084FC;--pg:rgba(147,51,234,.4);--dark:#0F0A1A;--pan:#1A0F2E;--pan2:#231540;--gold:#FFD700;--ok:#00CC6A;--err:#FF4444}
html,body{height:100%;overflow-x:hidden}
body{font-family:'Heebo',sans-serif;background:var(--dark);color:#fff;direction:rtl;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(107,33,168,.25),transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(255,107,0,.2),transparent 60%);pointer-events:none;z-index:0}

/* LOBBY */
#lobby{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;padding:24px;text-align:center;gap:20px}
.brand{font-size:11px;font-weight:800;letter-spacing:.3em;color:var(--orl);text-transform:uppercase}
.main-title{font-family:'Secular One',sans-serif;font-size:clamp(38px,5vw,66px);line-height:1.1;background:linear-gradient(135deg,var(--orl),#fff 40%,var(--pl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.lobby-grid{display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;justify-content:center;width:100%;max-width:900px}
.card{background:var(--pan);border:1px solid rgba(147,51,234,.3);border-radius:20px;padding:22px;display:flex;flex-direction:column;align-items:center;gap:12px;flex:1;min-width:210px}
.clabel{font-size:10px;font-weight:800;letter-spacing:.2em;color:var(--orl);text-transform:uppercase}
#qr-box{background:#fff;border-radius:12px;padding:8px;width:140px;height:140px;display:flex;align-items:center;justify-content:center}
.qr-url{font-size:11px;color:var(--pl);font-weight:700;word-break:break-all;text-align:center;max-width:240px}
.pcount{font-size:32px;font-weight:900;color:var(--or)}
.pcount-lbl{font-size:12px;color:rgba(255,255,255,.5)}
.sb-list{display:flex;flex-direction:column;gap:7px;width:100%;max-height:220px;overflow-y:auto}
.sb-row{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.04);border-radius:10px;padding:8px 14px;border:1px solid rgba(147,51,234,.12)}
.sb-row.top1{border-color:var(--gold);background:rgba(255,215,0,.08)}
.sb-rank{font-size:16px;width:24px;text-align:center}
.sb-name{flex:1;font-size:14px;font-weight:700}
.sb-pts{font-family:'Secular One',sans-serif;font-size:20px;color:var(--gold)}
.sb-empty{font-size:13px;color:rgba(255,255,255,.3);text-align:center;padding:20px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:15px 40px;border:none;border-radius:14px;font-family:'Heebo',sans-serif;font-size:18px;font-weight:800;cursor:pointer;transition:all .2s}
.btn-main{background:linear-gradient(135deg,var(--or),var(--orl));color:#fff;box-shadow:0 0 28px var(--og)}
.btn-main:hover{transform:translateY(-3px);box-shadow:0 0 44px var(--og)}
.btn-main:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-ghost{background:rgba(255,255,255,.07);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.12)}

/* GAME WRAPPER */
#game{display:none;position:fixed;inset:0;z-index:10;flex-direction:column;overflow:hidden}

/* WHEEL SCREEN */
#wheel-screen{position:absolute;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:20;padding:24px 32px;overflow-y:auto}
.wheel-title{font-family:'Secular One',sans-serif;font-size:28px;color:var(--orl);text-align:center;margin-bottom:4px}
.wheel-area{display:flex;gap:40px;align-items:center;justify-content:center;width:100%;max-width:1100px;flex:1}
.wheel-col{display:flex;flex-direction:column;align-items:center;gap:16px;flex-shrink:0}
.wheel-wrap{position:relative;width:420px;height:420px;flex-shrink:0}
#wheel-canvas{border-radius:50%;filter:drop-shadow(0 0 28px var(--pg))}
.wheel-ptr{position:absolute;top:-16px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:14px solid transparent;border-right:14px solid transparent;border-top:30px solid var(--or);filter:drop-shadow(0 0 8px var(--or))}
.wheel-ctr{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--or),var(--pm));display:flex;align-items:center;justify-content:center;font-size:20px}
.wheel-result{font-family:'Secular One',sans-serif;font-size:22px;text-align:center;color:#fff;min-height:30px}
.wheel-result span{color:var(--orl)}
.btn-spin{padding:16px 52px;font-size:22px;font-weight:900;background:linear-gradient(135deg,var(--pm),var(--pl));border:none;border-radius:16px;color:#fff;cursor:pointer;box-shadow:0 0 28px var(--pg);transition:all .2s;font-family:'Heebo',sans-serif}
.btn-spin:hover{transform:scale(1.06)}
.btn-spin:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* JEOPARDY BOARD */
.board-col{flex:1;min-width:420px}
.board-title{font-family:'Secular One',sans-serif;font-size:18px;color:var(--orl);margin-bottom:12px;text-align:center;letter-spacing:.05em}
.jboard{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%}
.jboard-cat{font-size:13px;font-weight:800;text-align:center;padding:12px 6px;border-radius:10px;line-height:1.35}
.jcat-0{background:#3a1a00;border:1px solid var(--or);color:var(--orl)}
.jcat-1{background:#1a0a2e;border:1px solid var(--pl);color:var(--pl)}
.jcat-2{background:#2a1a00;border:1px solid #FF9A3C;color:#FF9A3C}
.jcat-3{background:#1a0a2e;border:1px solid var(--pm);color:var(--pm)}
.jcard{border-radius:10px;padding:16px 4px;text-align:center;font-family:'Secular One',sans-serif;font-size:26px;font-weight:900;cursor:default;transition:all .2s;border:1px solid rgba(255,255,255,.1);background:var(--pan2);min-height:64px;display:flex;align-items:center;justify-content:center}
.jcard.available{color:var(--gold);border-color:rgba(255,215,0,.3)}
.jcard.used{opacity:.2;color:rgba(255,255,255,.3);border-color:transparent;font-size:0}
.jcard.used::after{content:'✓';display:block;font-size:20px;opacity:1}
.jcard.current{border-color:var(--or);background:rgba(255,107,0,.15);color:var(--orl);animation:jcurrent .8s infinite alternate}
@keyframes jcurrent{from{box-shadow:0 0 0 0 rgba(255,107,0,.4)}to{box-shadow:0 0 16px 4px rgba(255,107,0,.3)}}
.jcard.available{cursor:pointer}
.jcard.available:hover{border-color:var(--gold)!important;background:rgba(255,215,0,.12)!important;transform:scale(1.08)}
.btn-end-early{padding:9px 18px;font-size:13px;font-weight:800;border:2px solid rgba(255,68,68,.35);border-radius:9px;background:rgba(255,68,68,.08);color:#ff9999;cursor:pointer;font-family:'Heebo',sans-serif;transition:all .2s}
.btn-end-early:hover{background:rgba(255,68,68,.22);border-color:var(--err);color:#fff}

/* QUESTION SCREEN */
#q-screen{position:absolute;inset:0;background:var(--dark);display:none;flex-direction:column;padding:16px 24px 90px;gap:12px;overflow-y:auto}
.qhdr{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.qbadge{padding:8px 18px;border-radius:20px;font-size:16px;font-weight:800}
.qcat{background:linear-gradient(135deg,var(--or),var(--orl));color:#fff}
.qpts{background:linear-gradient(135deg,var(--pm),var(--pl));color:#fff}
.qtimer{font-family:'Secular One',sans-serif;font-size:52px;color:var(--gold);text-shadow:0 0 14px rgba(255,215,0,.5);min-width:50px;text-align:center}
.qtimer.urg{color:var(--err);animation:tpulse .5s infinite alternate}
@keyframes tpulse{from{transform:scale(1)}to{transform:scale(1.12)}}
.qtext{font-family:'Secular One',sans-serif;font-size:clamp(20px,2.5vw,32px);line-height:1.4;text-align:center;padding:18px;background:var(--pan);border-radius:14px;border:1px solid rgba(147,51,234,.3)}
.qimg-wrap{position:relative;max-width:660px;margin:0 auto;width:100%}
.qimg{width:100%;max-height:300px;object-fit:cover;border-radius:14px}
/* hotspot markers removed from host */
.qanswers{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%}
.qanswers.tf{grid-template-columns:1fr 1fr;max-width:600px;margin:0 auto}
.abtn{padding:16px;border:2px solid rgba(147,51,234,.25);border-radius:12px;background:var(--pan2);color:#fff;font-family:'Heebo',sans-serif;font-size:18px;font-weight:700;cursor:default;text-align:right;display:flex;align-items:center;gap:10px}
.abtn .ltr{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;background:rgba(255,107,0,.15);color:var(--orl);font-size:15px;font-weight:900;flex-shrink:0}
.abtn.correct{border-color:var(--ok)!important;background:rgba(0,204,106,.12)!important;color:var(--ok)}
.abtn.wrong{border-color:var(--err)!important;opacity:.4}
.qstats{background:var(--pan);border-radius:12px;padding:14px;width:100%}
.qstats-title{font-size:11px;font-weight:800;color:var(--orl);margin-bottom:8px;letter-spacing:.1em}
.stat-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:12px}
.stat-lbl{width:18px;font-weight:800;color:var(--pl)}
.stat-bar{flex:1;height:15px;background:rgba(255,255,255,.08);border-radius:5px;overflow:hidden}
.stat-fill{height:100%;border-radius:5px;transition:width 1s ease;background:linear-gradient(90deg,var(--or),var(--pm))}
.stat-fill.ck{background:linear-gradient(90deg,#00a855,var(--ok))}
.stat-cnt{width:32px;text-align:left;color:rgba(255,255,255,.5);font-size:11px}
.qexpl{background:linear-gradient(135deg,rgba(255,107,0,.08),rgba(147,51,234,.08));border:1px solid var(--or);border-radius:12px;padding:14px 18px;font-size:18px;line-height:1.6;width:100%}
.qexpl strong{color:var(--orl)}

/* BIG REVEAL BUTTON */
.reveal-big{width:100%;padding:20px;background:linear-gradient(135deg,var(--or),var(--orl));border:none;border-radius:16px;color:#fff;font-family:'Heebo',sans-serif;font-size:22px;font-weight:900;cursor:pointer;box-shadow:0 0 28px var(--og);transition:all .2s;letter-spacing:.04em;display:block}
.reveal-big:hover{transform:translateY(-2px);box-shadow:0 0 44px var(--og)}
.reveal-big.pulse{animation:revpulse 1s ease-in-out infinite}
@keyframes revpulse{0%,100%{box-shadow:0 0 28px var(--og)}50%{box-shadow:0 0 50px rgba(255,107,0,.9),0 0 80px rgba(255,107,0,.4)}}

/* BIG NEXT BUTTON after reveal */
.next-big{display:none;width:100%;padding:18px;background:linear-gradient(135deg,var(--pm),var(--pl));border:none;border-radius:16px;color:#fff;font-family:'Heebo',sans-serif;font-size:20px;font-weight:900;cursor:pointer;box-shadow:0 0 28px var(--pg);transition:all .2s;letter-spacing:.04em}
.next-big:hover{transform:translateY(-2px);box-shadow:0 0 44px var(--pg)}
.next-big.visible{display:block;animation:fadeUp .4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ANSWERED COUNT */
.answered-count{text-align:center;font-size:18px;color:rgba(255,255,255,.6);padding:6px;font-weight:700}
.answered-count b{color:var(--orl)}

/* SCORES / END */
#scores-screen{position:absolute;inset:0;background:var(--dark);display:none;flex-direction:column;align-items:center;padding:24px;gap:16px;overflow-y:auto}
.scores-title{font-family:'Secular One',sans-serif;font-size:28px;color:var(--orl)}
.scores-grid{display:flex;flex-direction:column;gap:9px;width:100%;max-width:560px}
.score-row{display:flex;align-items:center;gap:12px;background:var(--pan);border-radius:12px;padding:12px 17px;border:1px solid rgba(147,51,234,.2)}
.score-row.t1{border-color:var(--gold);background:rgba(255,215,0,.07)}
.score-medal{font-size:22px;width:30px;text-align:center}
.score-em{font-size:18px}
.score-name{flex:1;font-size:15px;font-weight:800}
.score-pts{font-family:'Secular One',sans-serif;font-size:20px;color:var(--gold)}
#end-screen{position:absolute;inset:0;background:var(--dark);display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:24px;text-align:center;overflow-y:auto}
.end-title{font-family:'Secular One',sans-serif;font-size:44px;background:linear-gradient(135deg,var(--or),var(--pl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.winner-card{background:var(--pan);border:2px solid var(--gold);border-radius:20px;padding:20px 32px;display:flex;flex-direction:column;align-items:center;gap:8px}
.winner-em{font-size:46px}
.winner-name{font-family:'Secular One',sans-serif;font-size:26px;color:var(--gold)}
.winner-sub{font-size:13px;color:rgba(255,255,255,.45)}

/* STATUS BAR */
.status-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(15,10,26,.97);backdrop-filter:blur(10px);border-top:1px solid rgba(147,51,234,.25);display:flex;align-items:center;justify-content:space-between;padding:8px 16px;gap:10px;z-index:50;flex-wrap:wrap}
.status-info{font-size:12px;color:rgba(255,255,255,.5)}
.status-info b{color:var(--orl)}
.status-btns{display:flex;gap:8px}
.bsm{padding:8px 16px;font-size:13px;font-weight:800;border:none;border-radius:9px;cursor:pointer;transition:all .2s;font-family:'Heebo',sans-serif}
.bor{background:var(--or);color:#fff}
.bpu{background:var(--pm);color:#fff}
.bdk{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.12)}
.bor:hover,.bpu:hover{transform:scale(1.05)}

/* NOTIF */
.notif{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-80px);background:linear-gradient(135deg,var(--pm),var(--or));color:#fff;padding:11px 26px;border-radius:13px;font-size:15px;font-weight:800;z-index:200;transition:transform .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 8px 28px rgba(0,0,0,.4)}
.notif.show{transform:translateX(-50%) translateY(0)}

/* PROG */
.prog-wrap{width:100%;max-width:660px;margin:0 auto}
.prog-bar{height:4px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--or),var(--pm));transition:width .5s ease;border-radius:3px}
.prog-lbl{font-size:14px;color:rgba(255,255,255,.5);text-align:center;margin-top:4px;font-weight:600}
</style>
</head>
<body>
<div class="notif" id="notif"></div>

<!-- LOBBY -->
<div id="lobby">
  <div class="brand">🏠 HB Learning</div>
  <div class="main-title">הבית הבטוח</div>
  <div class="lobby-grid">
    <div class="card">
      <div class="clabel">סרקו להצטרפות</div>
      <div id="qr-box"></div>
      <div class="qr-url" id="player-url"></div>
      <div class="pcount" id="pcount">0</div>
      <div class="pcount-lbl">משתתפים מחוברים</div>
    </div>
    <div class="card" style="max-width:300px">
      <div class="clabel">לוח שחקנים</div>
      <div class="sb-list" id="sb-list"><div class="sb-empty">ממתין לשחקנים...</div></div>
      <div style="font-size:11px;color:rgba(255,255,255,.3);margin-top:4px">אפשר להתחיל גם ללא שחקנים</div>
    </div>
  </div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
    <button class="btn btn-main" id="start-btn" onclick="window.startGame()">🎮 התחל משחק</button>
    <button class="btn btn-ghost" onclick="window.resetGame()">🗑️ אפס</button>
  </div>
</div>

<!-- GAME -->
<div id="game">
  <!-- WHEEL + BOARD -->
  <div id="wheel-screen">
    <div class="wheel-title" id="wheel-hdr">🎡 סובבו את גלגל הגורל!</div>
    <div class="wheel-area">
      <!-- Wheel -->
      <div class="wheel-col">
        <div class="wheel-wrap">
          <canvas id="wheel-canvas" width="420" height="420"></canvas>
          <div class="wheel-ptr"></div>
          <div class="wheel-ctr">🎡</div>
        </div>
        <div class="wheel-result" id="wheel-result"></div>
        <button class="btn-spin" id="spin-btn" onclick="window.spinWheel()">🎡 סובב!</button>
      </div>
      <!-- Jeopardy board -->
      <div class="board-col">
        <div class="board-title">📋 לוח השאלות</div>
        <div class="jboard" id="jboard"></div>
      </div>
    </div>
  </div>

  <!-- QUESTION -->
  <div id="q-screen">
    <!-- TOP BAR -->
    <div class="qhdr">
      <div style="display:flex;gap:10px;align-items:center">
        <span class="qbadge qcat" id="q-cat">קטגוריה</span>
        <span class="qbadge qpts" id="q-pts">נק׳</span>
      </div>
      <div class="prog-lbl" id="prog-lbl" style="flex:1;text-align:center">שאלה 1 מתוך 16</div>
      <div class="qtimer" id="q-timer">30</div>
    </div>
    <div class="prog-wrap">
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div class="qtext" id="q-text"></div>
    <div class="qimg-wrap" id="q-imgwrap" style="display:none">
      <img class="qimg" id="q-img" src="" alt="">
    </div>
    <div class="qanswers" id="q-answers"></div>
    <div class="answered-count" id="answered-count" style="display:none"></div>
    <button class="reveal-big" id="reveal-btn" onclick="window.revealAnswer()" style="display:none">✅ חשוף תשובה</button>
    <div class="qstats" id="q-stats" style="display:none">
      <div class="qstats-title">📊 התפלגות תשובות</div>
      <div id="stat-bars"></div>
    </div>
    <div class="qexpl" id="q-expl" style="display:none"></div>
    <button class="next-big" id="next-big" onclick="window.nextQuestion()">← הבא | המשך למשחק</button>
  </div>

  <!-- SCORES -->
  <div id="scores-screen">
    <div class="scores-title">📊 ניקוד ביניים</div>
    <div class="scores-grid" id="scores-grid"></div>
    <button class="btn btn-main" onclick="window.continueGame()">המשך ▶</button>
  </div>

  <!-- END -->
  <div id="end-screen">
    <div class="end-title">🏆 המשחק הסתיים!</div>
    <div class="winner-card">
      <div class="winner-em" id="w-em">🥇</div>
      <div class="winner-name" id="w-name">המנצח</div>
      <div class="winner-sub" id="w-pts"></div>
    </div>
    <div class="scores-grid" id="final-grid" style="max-width:500px;width:100%"></div>
    <button class="btn btn-main" onclick="window.resetGame()">🔄 משחק חדש</button>
  </div>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <div class="status-info">שחקנים: <b id="st-players">0</b> &nbsp;|&nbsp; שאלה <b id="st-q">0/16</b></div>
    <div class="status-btns">
      <button class="bsm bdk" onclick="window.showScores()">📊 ניקוד</button>
      <button class="btn-end-early" onclick="window.endEarly()">🏁 סיים פעילות</button>
      <button class="bsm bdk" onclick="window.resetGame()">🗑️</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp }   from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, remove, update, onValue, onDisconnect } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const app = initializeApp({
  apiKey:'AIzaSyA2_sajeisUbl0S3hePbxfcZMKHnfO8mX8',
  authDomain:'hb-ergonomics.firebaseapp.com',
  databaseURL:'https://hb-ergonomics-default-rtdb.firebaseio.com/',
  projectId:'hb-ergonomics',
  storageBucket:'hb-ergonomics.firebasestorage.app',
  messagingSenderId:'999618112514',
  appId:'1:999618112514:web:0c9da1f0b448a28aa48b1b'
});
const db = getDatabase(app);
const SESSION = 'home_' + Math.random().toString(36).slice(2,7);

const CATS    = ['🔥 אש וחשמל','💧 נפילה והחלקה','☠️ סכנות נסתרות','🚨 שעת חירום'];
const WCOLORS = ['#FF6B00','#6B21A8','#FF9A3C','#9333EA'];

const QUESTIONS = [

/* STATE */
let players={}, currentQ=null, timerInt=null, timeLeft=30;
let playerAnswers={}, revealed=false, gameStarted=false, usedQs=new Set();
let spinning=false, wheelAngle=0;

/* FIREBASE */
onValue(ref(db,`${SESSION}/players`), snap=>{
  players={};
  snap.forEach(c=>{ players[c.key]=c.val(); });
  const cnt=Object.keys(players).length;
  document.getElementById('pcount').textContent=cnt;
  document.getElementById('st-players').textContent=cnt;
  // no minimum player requirement
  updateSidebar();
});
onValue(ref(db,`${SESSION}/answers`), snap=>{
  playerAnswers={};
  snap.forEach(c=>{ playerAnswers[c.key]=c.val(); });
  const cnt=Object.keys(playerAnswers).length;
  const tot=Object.keys(players).length;
  const el=document.getElementById('answered-count');
  if(el&&gameStarted&&!revealed){
    el.style.display='block';
    el.innerHTML=`<b>${cnt}</b> מתוך ${tot} ענו`;
  }
  // Pulse reveal button when players start / finish answering
  const revBtn=document.getElementById('reveal-btn');
  if(revBtn&&revBtn.style.display!=='none'&&!revealed){
    if(cnt>=tot&&tot>0){
      revBtn.classList.add('pulse');
      revBtn.textContent='✅ כולם ענו — חשוף תשובה!';
    } else if(cnt>0){
      revBtn.classList.add('pulse');
    }
  }

});

/* QR */
function setupQR(){
  const base=location.href.replace(/index\.html.*$/,'').replace(/\/*$/,'/');
  const pUrl=base+'player.html?s='+SESSION;
  document.getElementById('player-url').textContent=pUrl;
  try{
    new QRCode(document.getElementById('qr-box'),{text:pUrl,width:124,height:124,colorDark:'#1A0F2E',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
  }catch(e){document.getElementById('qr-box').textContent=pUrl;}
  set(ref(db,`${SESSION}/session`),{active:true,playerUrl:pUrl,started:false});
}

/* SIDEBAR */
function updateSidebar(){
  const sorted=Object.entries(players).sort((a,b)=>(b[1].score||0)-(a[1].score||0));
  const list=document.getElementById('sb-list');
  if(!sorted.length){list.innerHTML='<div class="sb-empty">ממתין לשחקנים...</div>';return;}
  list.innerHTML=sorted.map(([id,p],i)=>`
    <div class="sb-row ${i===0?'top1':''}">
      <span class="sb-rank">${['🥇','🥈','🥉'][i]||'#'+(i+1)}</span>
      <span style="font-size:16px">${p.emoji||'🙂'}</span>
      <span class="sb-name">${p.name}</span>
      <span class="sb-pts">${p.score||0}</span>
    </div>`).join('');
}

/* JEOPARDY BOARD */
function buildBoard(){
  const board=document.getElementById('jboard');
  board.innerHTML='';
  CATS.forEach((cat,ci)=>{
    const hd=document.createElement('div');
    hd.className='jboard-cat jcat-'+ci;
    hd.textContent=cat;
    board.appendChild(hd);
  });
  [100,200,300,400].forEach(pts=>{
    CATS.forEach((cat,ci)=>{
      const qi=QUESTIONS.findIndex(q=>q.cat===cat&&q.pts===pts);
      const div=document.createElement('div');
      const used=usedQs.has(qi);
      const isCurrent=currentQ&&QUESTIONS.indexOf(currentQ)===qi;
      div.className='jcard '+(isCurrent?'current':used?'used':'available');
      div.textContent=used?'':pts;
      if(!used&&!isCurrent){
        div.onclick=()=>window.pickQuestion(qi);
        div.title='לחץ להריץ שאלה זו ישירות';
      }
      board.appendChild(div);
    });
  });
}

/* WHEEL */
function drawWheel(angle){
  const c=document.getElementById('wheel-canvas');
  const ctx=c.getContext('2d');
  const cx=210,cy=210,r=198;
  const arc=2*Math.PI/CATS.length;
  ctx.clearRect(0,0,260,260);
  CATS.forEach((cat,i)=>{
    const s=angle+i*arc-Math.PI/2,e=s+arc;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,s,e);ctx.closePath();
    ctx.fillStyle=WCOLORS[i];ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=2;ctx.stroke();
    ctx.save();ctx.translate(cx,cy);ctx.rotate(s+arc/2);
    ctx.textAlign='right';ctx.fillStyle='#fff';
    ctx.font='bold 16px Heebo,sans-serif';
    ctx.fillText(cat,r-8,5);ctx.restore();
  });
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,22);
  g.addColorStop(0,'#FF9A3C');g.addColorStop(1,'#6B21A8');
  ctx.beginPath();ctx.arc(cx,cy,22,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
}

function spinWheel(){
  if(spinning)return;
  const avail=QUESTIONS.filter((_,i)=>!usedQs.has(i));
  if(!avail.length){endGame();return;}
  spinning=true;
  document.getElementById('spin-btn').disabled=true;
  document.getElementById('wheel-result').innerHTML='';
  const ri=Math.floor(Math.random()*avail.length);
  const q=avail[ri];
  const qGlobal=QUESTIONS.indexOf(q);
  const catIdx=CATS.indexOf(q.cat);
  const target=-(catIdx*(2*Math.PI/CATS.length));
  const turns=4+Math.random()*3;
  const end=target-turns*2*Math.PI+Math.random()*.2-.1;
  const start0=wheelAngle,dur=3500,t0=performance.now();
  function anim(now){
    const t=Math.min((now-t0)/dur,1);
    const ease=1-Math.pow(1-t,4);
    wheelAngle=start0+(end-start0)*ease;
    drawWheel(wheelAngle);
    if(t<1){requestAnimationFrame(anim);}
    else{
      spinning=false;
      document.getElementById('wheel-result').innerHTML=`נבחר: <span>${q.cat} | ${q.pts} נק׳</span>`;
      setTimeout(()=>{ usedQs.add(qGlobal); showQuestion(q); },1000);
    }
  }
  requestAnimationFrame(anim);
}

/* QUESTION */
function showQuestion(q){
  currentQ=q; playerAnswers={}; revealed=false;
  clearInterval(timerInt);
  switchScreen('q-screen');
  document.getElementById('q-cat').textContent=q.cat;
  document.getElementById('q-pts').textContent=q.pts+' נק׳';
  document.getElementById('q-text').textContent=q.text;
  document.getElementById('q-stats').style.display='none';
  document.getElementById('q-expl').style.display='none';
  document.getElementById('answered-count').style.display='none';
  const revBtnEl=document.getElementById('reveal-btn');
  revBtnEl.style.display='block';
  revBtnEl.classList.remove('pulse');
  revBtnEl.textContent='✅ חשוף תשובה';
  document.getElementById('next-big').classList.remove('visible');
  const num=usedQs.size;
  document.getElementById('st-q').textContent=`${num}/16`;
  document.getElementById('prog-fill').style.width=`${(num/16)*100}%`;
  document.getElementById('prog-lbl').textContent=`שאלה ${num} מתוך 16`;

  // Image
  const imgWrap=document.getElementById('q-imgwrap');
  if(q.img){
    imgWrap.style.display='block';
    document.getElementById('q-img').src=q.img;
    imgWrap.querySelectorAll('.hotspot-host').forEach(h=>h.remove());
    // hotspot markers not shown on host screen
  } else { imgWrap.style.display='none'; }

  // Answers
  const wrap=document.getElementById('q-answers');
  wrap.innerHTML='';
  wrap.className=q.type==='tf'?'qanswers tf':'qanswers';
  if(q.type!=='hotspot'){
    const lts=['א','ב','ג','ד'];
    q.opts.forEach((o,i)=>{
      const b=document.createElement('button');
      b.className='abtn';
      b.innerHTML=`<span class="ltr">${lts[i]}</span> ${o}`;
      wrap.appendChild(b);
    });
  }

  // Push to Firebase — include hotspots for player
  set(ref(db,`${SESSION}/currentQ`),{
    cat:q.cat,pts:q.pts,type:q.type,text:q.text,
    opts:q.opts||null,correct:q.correct,
    img:q.img||null,
    hotspots:q.hotspots?q.hotspots.map((h,i)=>({x:h.x,y:h.y,lbl:h.lbl,idx:i})):null,
    expl:q.expl,qId:Date.now()
  });
  remove(ref(db,`${SESSION}/answers`));
  remove(ref(db,`${SESSION}/correct`));
  remove(ref(db,`${SESSION}/hotspotReveal`));
  set(ref(db,`${SESSION}/gameState`),'question');

  timeLeft=30; updateTimer();
  timerInt=setInterval(()=>{
    timeLeft--;updateTimer();
    if(timeLeft<=0){clearInterval(timerInt);}
  },1000);
}

function updateTimer(){
  const el=document.getElementById('q-timer');
  el.textContent=timeLeft;
  el.className='qtimer'+(timeLeft<=10?' urg':'');
}

/* REVEAL */
function revealAnswer(){
  if(revealed)return;
  revealed=true;
  clearInterval(timerInt);
  const rb=document.getElementById('reveal-btn');
  rb.style.display='none'; rb.classList.remove('pulse');
  document.getElementById('answered-count').style.display='none';
  const q=currentQ;

  // Highlight answers
  document.querySelectorAll('.abtn').forEach((b,i)=>{
    if(i===q.correct) b.classList.add('correct');
    else b.classList.add('wrong');
  });

  // Stats
  if(q.type!=='hotspot'){
    document.getElementById('q-stats').style.display='block';
    const counts=(q.opts||[]).map((_,i)=>Object.values(playerAnswers).filter(a=>a.answer===i).length);
    const total=Object.values(playerAnswers).length||1;
    const lts=['א','ב','ג','ד'];
    document.getElementById('stat-bars').innerHTML=counts.map((c,i)=>`
      <div class="stat-row">
        <div class="stat-lbl">${lts[i]}</div>
        <div class="stat-bar"><div class="stat-fill ${i===q.correct?'ck':''}" style="width:${Math.round((c/total)*100)}%"></div></div>
        <div class="stat-cnt">${c}</div>
      </div>`).join('');
  }

  // Explain
  document.getElementById('q-expl').innerHTML=`<strong>💡 הסבר:</strong> ${q.expl}`;
  document.getElementById('q-expl').style.display='block';

  // Score (only for non-hotspot)
  if(q.type!=='hotspot') scoreRound(q);

  // For hotspot: show markers on host after reveal
  if(q.type==='hotspot' && q.hotspots){
    const imgWrap=document.getElementById('q-imgwrap');
    imgWrap.querySelectorAll('.hotspot-reveal').forEach(h=>h.remove());
    q.hotspots.forEach((hs,i)=>{
      const mk=document.createElement('div');
      mk.className='hotspot-reveal';
      mk.style.cssText=`position:absolute;left:${hs.x}%;top:${hs.y}%;transform:translate(-50%,-50%);
        width:44px;height:44px;border-radius:50%;border:3px solid var(--ok);
        background:rgba(0,204,106,.3);display:flex;align-items:center;justify-content:center;
        font-size:18px;pointer-events:none;z-index:10`;
      mk.textContent='✅';
      mk.title=hs.lbl;
      imgWrap.appendChild(mk);
    });
  }

  set(ref(db,`${SESSION}/gameState`),'reveal');
  if(q.correct!==undefined&&q.correct!==null) set(ref(db,`${SESSION}/correct`),q.correct);
  // For hotspot — send hotspot locations so player can show them
  if(q.type==='hotspot') set(ref(db,`${SESSION}/hotspotReveal`),true);

  // Show big NEXT button — ALWAYS, including hotspot
  const nextBtn = document.getElementById('next-big');
  nextBtn.classList.add('visible');
  setTimeout(()=>{
    nextBtn.scrollIntoView({behavior:'smooth',block:'nearest'});
  },300);
}

/* SCORING */
function scoreRound(q){
  const updates={};
  Object.entries(playerAnswers).forEach(([id,data])=>{
    if(data.answer===q.correct){
      const elapsed=data.elapsed||20000;
      const bonus=Math.floor(Math.max(0,(1-elapsed/30000))*q.pts*0.5);
      const pts=q.pts+bonus;
      updates[`${SESSION}/players/${id}/score`]=(players[id]?.score||0)+pts;
    }
  });
  if(Object.keys(updates).length) update(ref(db,'/'),updates);
}

/* NEXT */
function nextQuestion(){
  const avail=QUESTIONS.filter((_,i)=>!usedQs.has(i));
  if(!avail.length){endGame();return;}
  switchScreen('wheel-screen');
  buildBoard();
  document.getElementById('spin-btn').disabled=false;
  document.getElementById('wheel-result').innerHTML='';
  document.getElementById('wheel-hdr').textContent=`${usedQs.size} עברו · ${avail.length} נותרו`;
  set(ref(db,`${SESSION}/gameState`),'wheel');
}

  if(!avail.length){endGame();return;}
  switchScreen('wheel-screen');
  buildBoard();
  set(ref(db,`${SESSION}/gameState`),'wheel');
}
function renderScores(elId){
  const sorted=Object.entries(players).sort((a,b)=>(b[1].score||0)-(a[1].score||0));
  document.getElementById(elId).innerHTML=sorted.map(([id,p],i)=>`
    <div class="score-row ${['t1','t2','t3'][i]||''}">
      <div class="score-medal">${['🥇','🥈','🥉'][i]||'#'+(i+1)}</div>
      <div class="score-em">${p.emoji||'🙂'}</div>
      <div class="score-name">${p.name}</div>
      <div class="score-pts">${p.score||0}</div>
    </div>`).join('');
}
function endGame(){
  clearInterval(timerInt);
  switchScreen('end-screen');
  set(ref(db,`${SESSION}/gameState`),'end');
  const sorted=Object.entries(players).sort((a,b)=>(b[1].score||0)-(a[1].score||0));
  if(sorted.length){
    const [,wp]=sorted[0];
    document.getElementById('w-em').textContent=wp.emoji||'🥇';
    document.getElementById('w-name').textContent=wp.name;
    document.getElementById('w-pts').textContent=(wp.score||0)+' נקודות';
  }
  renderScores('final-grid');
}
function resetGame(){
  remove(ref(db,SESSION)).then(()=>location.reload());
}
function startGame(){
  gameStarted=true;
  document.getElementById('lobby').style.display='none';
  document.getElementById('game').style.display='flex';
  document.getElementById('game').style.flexDirection='column';
  switchScreen('wheel-screen');
  buildBoard();
  drawWheel(0);
  set(ref(db,`${SESSION}/session/started`),true);
  set(ref(db,`${SESSION}/gameState`),'wheel');
  showNotif('🎮 המשחק התחיל!');
}
function switchScreen(id){
  ['wheel-screen','q-screen','scores-screen','end-screen'].forEach(s=>{
    const el=document.getElementById(s);
    el.style.display=el.id===id?'flex':'none';
    if(el.id===id) el.style.flexDirection='column';
  });
}
function showNotif(msg){
  const el=document.getElementById('notif');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

/* ── בחירת שאלה ידנית ── */
function pickQuestion(qi){
  if(usedQs.has(qi)) return;
  usedQs.add(qi);
  showQuestion(QUESTIONS[qi]);
}

/* ── סיום מוקדם ── */
function endEarly(){
  if(!window.confirm('לסיים את הפעילות עכשיו?\nהניקוד הסופי יוצג לכולם.')) return;
  clearInterval(timerInt);
  endGame();
}

/* EXPOSE — all functions on window */
window.startGame=startGame;
window.resetGame=resetGame;
window.spinWheel=spinWheel;
window.revealAnswer=revealAnswer;
window.nextQuestion=nextQuestion;
window.showScores=showScores;
window.continueGame=continueGame;
window.pickQuestion=pickQuestion;
window.endEarly=endEarly;

/* INIT */
setupQR(); drawWheel(0);
</script>
</body>
</html>
