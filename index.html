<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הבית הבטוח | מנחה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;800;900&family=Secular+One&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--or:#FF6B00;--orl:#FF9A3C;--og:rgba(255,107,0,.4);--pu:#6B21A8;--pm:#9333EA;--pl:#C084FC;--pg:rgba(147,51,234,.4);--dark:#0F0A1A;--pan:#1A0F2E;--pan2:#231540;--gold:#FFD700;--ok:#00CC6A;--err:#FF4444}
html,body{height:100%;overflow-x:hidden}
body{font-family:'Heebo',sans-serif;background:var(--dark);color:#fff;direction:rtl;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(107,33,168,.25) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(255,107,0,.2) 0%,transparent 60%);pointer-events:none;z-index:0}
#lobby{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;padding:24px;text-align:center;gap:20px}
.brand{font-size:11px;font-weight:800;letter-spacing:.3em;color:var(--orl);text-transform:uppercase}
.main-title{font-family:'Secular One',sans-serif;font-size:clamp(38px,5vw,66px);line-height:1.1;background:linear-gradient(135deg,var(--orl) 0%,#fff 40%,var(--pl) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.lobby-grid{display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;justify-content:center;width:100%;max-width:900px}
.card{background:var(--pan);border:1px solid rgba(147,51,234,.3);border-radius:20px;padding:22px;display:flex;flex-direction:column;align-items:center;gap:12px;flex:1;min-width:210px}
.clabel{font-size:10px;font-weight:800;letter-spacing:.2em;color:var(--orl);text-transform:uppercase}
#qr-box{background:#fff;border-radius:12px;padding:8px;width:140px;height:140px;display:flex;align-items:center;justify-content:center}
.qr-url{font-size:12px;color:var(--pl);font-weight:700;word-break:break-all;text-align:center;max-width:240px}
.pcount{font-size:32px;font-weight:900;color:var(--or)}
.pcount-lbl{font-size:12px;color:rgba(255,255,255,.5)}
.sb-list{display:flex;flex-direction:column;gap:7px;width:100%;max-height:220px;overflow-y:auto}
.sb-row{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.04);border-radius:10px;padding:8px 14px;border:1px solid rgba(147,51,234,.12);transition:all .3s}
.sb-row.top1{border-color:var(--gold);background:rgba(255,215,0,.08)}
.sb-rank{font-size:16px;width:24px;text-align:center}
.sb-name{flex:1;font-size:14px;font-weight:700}
.sb-pts{font-family:'Secular One',sans-serif;font-size:20px;color:var(--gold)}
.sb-empty{font-size:13px;color:rgba(255,255,255,.3);text-align:center;padding:20px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:15px 40px;border:none;border-radius:14px;font-family:'Heebo',sans-serif;font-size:18px;font-weight:800;cursor:pointer;transition:all .2s}
.btn-main{background:linear-gradient(135deg,var(--or),var(--orl));color:#fff;box-shadow:0 0 28px var(--og)}
.btn-main:hover{transform:translateY(-3px);box-shadow:0 0 44px var(--og)}
.btn-main:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-ghost{background:rgba(255,255,255,.07);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.12)}
#game{display:none;position:fixed;inset:0;z-index:10;flex-direction:column;padding-bottom:60px;overflow:hidden}
#wheel-screen{position:absolute;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:20;padding:20px;overflow-y:auto}
.wheel-title{font-family:'Secular One',sans-serif;font-size:22px;color:var(--orl);text-align:center}
.wheel-wrap{position:relative;width:300px;height:300px;flex-shrink:0}
#wheel-canvas{border-radius:50%;filter:drop-shadow(0 0 20px var(--pg))}
.wheel-ptr{position:absolute;top:-14px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:11px solid transparent;border-right:11px solid transparent;border-top:24px solid var(--or);filter:drop-shadow(0 0 6px var(--or))}
.wheel-ctr{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--or),var(--pm));display:flex;align-items:center;justify-content:center;font-size:16px}
.wheel-result{font-family:'Secular One',sans-serif;font-size:19px;text-align:center;color:#fff;min-height:26px}
.wheel-result span{color:var(--orl)}
.btn-spin{padding:15px 44px;font-size:18px;font-weight:900;background:linear-gradient(135deg,var(--pm),var(--pl));border:none;border-radius:14px;color:#fff;cursor:pointer;box-shadow:0 0 24px var(--pg);transition:all .2s;font-family:'Heebo',sans-serif}
.btn-spin:hover{transform:scale(1.05)}
.btn-spin:disabled{opacity:.5;cursor:not-allowed;transform:none}
#q-screen{position:absolute;inset:0;background:var(--dark);display:none;flex-direction:column;padding:16px;gap:12px;overflow-y:auto}
.qhdr{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.qbadge{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:800}
.qcat{background:linear-gradient(135deg,var(--or),var(--orl));color:#fff}
.qpts{background:linear-gradient(135deg,var(--pm),var(--pl));color:#fff}
.qtimer{font-family:'Secular One',sans-serif;font-size:38px;color:var(--gold);text-shadow:0 0 14px rgba(255,215,0,.5);min-width:50px;text-align:center}
.qtimer.urg{color:var(--err);animation:tpulse .5s infinite alternate}
@keyframes tpulse{from{transform:scale(1)}to{transform:scale(1.12)}}
.qtext{font-family:'Secular One',sans-serif;font-size:clamp(17px,2.2vw,26px);line-height:1.4;text-align:center;padding:16px;background:var(--pan);border-radius:14px;border:1px solid rgba(147,51,234,.3)}
.qimg-wrap{position:relative;max-width:660px;margin:0 auto;width:100%}
.qimg{width:100%;max-height:260px;object-fit:cover;border-radius:14px}
.hotspot{position:absolute;width:40px;height:40px;border-radius:50%;border:3px solid var(--or);background:rgba(255,107,0,.2);cursor:pointer;display:flex;align-items:center;justify-content:center;animation:hpulse 2s infinite;transition:all .2s;font-size:13px}
@keyframes hpulse{0%,100%{box-shadow:0 0 0 0 rgba(255,107,0,.5)}50%{box-shadow:0 0 0 9px transparent}}
.hotspot.found{border-color:var(--ok);background:rgba(0,204,106,.25);animation:none}
.qanswers{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:660px;margin:0 auto;width:100%}
.qanswers.tf{grid-template-columns:1fr 1fr}
.abtn{padding:14px 14px;border:2px solid rgba(147,51,234,.25);border-radius:12px;background:var(--pan2);color:#fff;font-family:'Heebo',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;text-align:right;display:flex;align-items:center;gap:9px}
.abtn:hover{border-color:var(--pm);background:rgba(147,51,234,.15);transform:translateY(-2px)}
.abtn .ltr{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:7px;background:rgba(255,107,0,.15);color:var(--orl);font-size:12px;font-weight:900;flex-shrink:0}
.abtn.correct{border-color:var(--ok)!important;background:rgba(0,204,106,.12)!important;color:var(--ok)}
.abtn.wrong{border-color:var(--err)!important;opacity:.4}
.qstats{background:var(--pan);border-radius:13px;padding:13px;max-width:660px;margin:0 auto;width:100%}
.qstats-title{font-size:11px;font-weight:800;color:var(--orl);margin-bottom:9px;letter-spacing:.1em}
.stat-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px}
.stat-lbl{width:18px;font-weight:800;color:var(--pl)}
.stat-bar{flex:1;height:17px;background:rgba(255,255,255,.08);border-radius:5px;overflow:hidden}
.stat-fill{height:100%;border-radius:5px;transition:width 1s ease;background:linear-gradient(90deg,var(--or),var(--pm))}
.stat-fill.ck{background:linear-gradient(90deg,#00a855,var(--ok))}
.stat-cnt{width:22px;text-align:center;color:rgba(255,255,255,.5)}
.qexpl{background:linear-gradient(135deg,rgba(255,107,0,.08),rgba(147,51,234,.08));border:1px solid var(--or);border-radius:12px;padding:13px 15px;font-size:14px;line-height:1.6;max-width:660px;margin:0 auto;width:100%}
.qexpl strong{color:var(--orl)}
#scores-screen{position:absolute;inset:0;background:var(--dark);display:none;flex-direction:column;align-items:center;padding:24px;gap:16px;overflow-y:auto}
.scores-title{font-family:'Secular One',sans-serif;font-size:30px;color:var(--orl)}
.scores-grid{display:flex;flex-direction:column;gap:9px;width:100%;max-width:560px}
.score-row{display:flex;align-items:center;gap:12px;background:var(--pan);border-radius:12px;padding:12px 17px;border:1px solid rgba(147,51,234,.2);animation:slin .4s ease both}
.score-row.t1{border-color:var(--gold);background:rgba(255,215,0,.07)}
.score-row.t2{border-color:rgba(192,192,192,.4)}
.score-row.t3{border-color:rgba(205,127,50,.4)}
@keyframes slin{from{opacity:0;transform:translateX(22px)}to{opacity:1;transform:none}}
.score-medal{font-size:24px;width:34px;text-align:center}
.score-em{font-size:20px}
.score-name{flex:1;font-size:16px;font-weight:800}
.score-pts{font-family:'Secular One',sans-serif;font-size:22px;color:var(--gold)}
#end-screen{position:absolute;inset:0;background:var(--dark);display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:24px;text-align:center;overflow-y:auto}
.end-title{font-family:'Secular One',sans-serif;font-size:46px;background:linear-gradient(135deg,var(--or),var(--pl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.winner-card{background:var(--pan);border:2px solid var(--gold);border-radius:20px;padding:24px 36px;display:flex;flex-direction:column;align-items:center;gap:8px}
.winner-em{font-size:50px}
.winner-name{font-family:'Secular One',sans-serif;font-size:28px;color:var(--gold)}
.winner-sub{font-size:14px;color:rgba(255,255,255,.45)}
.status-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(15,10,26,.97);backdrop-filter:blur(10px);border-top:1px solid rgba(147,51,234,.25);display:flex;align-items:center;justify-content:space-between;padding:9px 18px;gap:10px;z-index:50;flex-wrap:wrap}
.status-info{font-size:12px;color:rgba(255,255,255,.5)}
.status-info b{color:var(--orl)}
.status-btns{display:flex;gap:8px}
.bsm{padding:8px 16px;font-size:13px;font-weight:800;border:none;border-radius:9px;cursor:pointer;transition:all .2s;font-family:'Heebo',sans-serif}
.bor{background:var(--or);color:#fff}
.bpu{background:var(--pm);color:#fff}
.bdk{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.12)}
.notif{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-80px);background:linear-gradient(135deg,var(--pm),var(--or));color:#fff;padding:11px 26px;border-radius:13px;font-size:15px;font-weight:800;z-index:200;transition:transform .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 8px 28px rgba(0,0,0,.4)}
.notif.show{transform:translateX(-50%) translateY(0)}
.prog-wrap{width:100%;max-width:660px;margin:0 auto}
.prog-bar{height:5px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--or),var(--pm));transition:width .5s ease;border-radius:3px}
.prog-lbl{font-size:11px;color:rgba(255,255,255,.4);text-align:center;margin-top:3px}
.answered-count{text-align:center;font-size:13px;color:rgba(255,255,255,.5);padding:4px}
.answered-count b{color:var(--orl)}
</style>
</head>
<body>
<div class="notif" id="notif"></div>

<!-- LOBBY -->
<div id="lobby">
  <div class="brand">🏠 HB Learning</div>
  <div class="main-title">הבית הבטוח</div>
  <div class="lobby-grid">
    <div class="card">
      <div class="clabel">סרקו להצטרפות</div>
      <div id="qr-box"></div>
      <div class="qr-url" id="player-url"></div>
      <div class="pcount" id="pcount">0</div>
      <div class="pcount-lbl">משתתפים מחוברים</div>
    </div>
    <div class="card" style="max-width:300px">
      <div class="clabel">לוח שחקנים</div>
      <div class="sb-list" id="sb-list"><div class="sb-empty">ממתין לשחקנים...</div></div>
      <div style="font-size:12px;color:rgba(255,255,255,.35);margin-top:4px">דרושים לפחות 2 שחקנים</div>
    </div>
  </div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
    <button class="btn btn-main" id="start-btn" disabled onclick="startGame()">🎮 התחל משחק</button>
    <button class="btn btn-ghost" onclick="resetGame()">🗑️ אפס</button>
  </div>
</div>

<!-- GAME -->
<div id="game">
  <!-- WHEEL -->
  <div id="wheel-screen">
    <div class="wheel-title" id="wheel-hdr">בחרו קטגוריה!</div>
    <div class="wheel-wrap">
      <canvas id="wheel-canvas" width="300" height="300"></canvas>
      <div class="wheel-ptr"></div>
      <div class="wheel-ctr">🎡</div>
    </div>
    <div class="wheel-result" id="wheel-result"></div>
    <button class="btn-spin" id="spin-btn" onclick="spinWheel()">🎡 סובב!</button>
  </div>

  <!-- QUESTION -->
  <div id="q-screen">
    <div class="qhdr">
      <div style="display:flex;gap:8px;align-items:center">
        <span class="qbadge qcat" id="q-cat">קטגוריה</span>
        <span class="qbadge qpts" id="q-pts">נק׳</span>
      </div>
      <div class="qtimer" id="q-timer">30</div>
    </div>
    <div class="prog-wrap">
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
      <div class="prog-lbl" id="prog-lbl">שאלה 1 מתוך 16</div>
    </div>
    <div class="qtext" id="q-text"></div>
    <div class="qimg-wrap" id="q-imgwrap" style="display:none">
      <img class="qimg" id="q-img" src="" alt="תמונת שאלה">
    </div>
    <div class="qanswers" id="q-answers"></div>
    <div class="answered-count" id="answered-count" style="display:none"></div>
    <div class="qstats" id="q-stats" style="display:none">
      <div class="qstats-title">📊 התפלגות תשובות</div>
      <div id="stat-bars"></div>
    </div>
    <div class="qexpl" id="q-expl" style="display:none"></div>
  </div>

  <!-- SCORES -->
  <div id="scores-screen">
    <div class="scores-title">📊 ניקוד ביניים</div>
    <div class="scores-grid" id="scores-grid"></div>
    <button class="btn btn-main" onclick="continueGame()">המשך ▶</button>
  </div>

  <!-- END -->
  <div id="end-screen">
    <div class="end-title">🏆 המשחק הסתיים!</div>
    <div class="winner-card">
      <div class="winner-em" id="w-em">🥇</div>
      <div class="winner-name" id="w-name">המנצח</div>
      <div class="winner-sub" id="w-pts"></div>
    </div>
    <div class="scores-grid" id="final-grid" style="max-width:500px;width:100%"></div>
    <button class="btn btn-main" onclick="resetGame()">🔄 משחק חדש</button>
  </div>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <div class="status-info">שחקנים: <b id="st-players">0</b> | שאלה <b id="st-q">0/16</b></div>
    <div class="status-btns">
      <button class="bsm bor" id="reveal-btn" onclick="revealAnswer()" style="display:none">✅ חשוף תשובה</button>
      <button class="bsm bpu" id="next-btn" onclick="nextQuestion()" style="display:none">הבא ▶</button>
      <button class="bsm bdk" onclick="showScores()">📊 ניקוד</button>
      <button class="bsm bdk" onclick="resetGame()">🗑️</button>
    </div>
  </div>
</div>

<script type="module">

import { getDatabase, ref, set, remove, update,
         onValue, onDisconnect }                  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

/* ── FIREBASE ── */

/* ── DATA ── */

const QUESTIONS = [

  {cat:'💧 נפילה והחלקה',pts:100,type:'tf',
   text:'שטיח מקופל בכניסה הוא בעיה אסתטית בלבד.',
   opts:['✅ אמת','❌ שקר'],correct:1,
   img:'https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=700&q=80',
   expl:'שקר! שטיח מקופל = סכנת נפילה. חובה לדאוג שיהיה ישר ודבוק.'},
  {cat:'💧 נפילה והחלקה',pts:200,type:'mc',
   text:'כמה סכנות נפילה רואים במדרגות ללא מעקה, בחשיכה עם נעליים מפוזרות?',

/* ── STATE ── */
let players={}, currentQ=null, timerInt=null, timeLeft=30;
let playerAnswers={}, revealed=false, gameStarted=false, usedQs=new Set();
let spinning=false, wheelAngle=0;

/* ── FIREBASE LISTENERS ── */
onValue(ref(db,`${SESSION}/players`), snap=>{
  players={};
  snap.forEach(c=>{ players[c.key]=c.val(); });
  const cnt=Object.keys(players).length;
  document.getElementById('pcount').textContent=cnt;
  document.getElementById('st-players').textContent=cnt;
  document.getElementById('start-btn').disabled=cnt<2;
  updateSidebar();
});

onValue(ref(db,`${SESSION}/answers`), snap=>{
  playerAnswers={};
  snap.forEach(c=>{ playerAnswers[c.key]=c.val(); });
  const cnt=Object.keys(playerAnswers).length;
  const tot=Object.keys(players).length;
  const el=document.getElementById('answered-count');
  if(el&&gameStarted&&!revealed){
    el.style.display='block';
    el.innerHTML=`<b>${cnt}</b> מתוך ${tot} ענו`;
  }
});

/* ── QR ── */
function setupQR(){
  const base=location.href.replace(/index\.html.*$/,'').replace(/\/*$/,'/');
  const pUrl=base+'player.html?s='+SESSION;
  document.getElementById('player-url').textContent=pUrl;
  try{
    new QRCode(document.getElementById('qr-box'),{
      text:pUrl,width:124,height:124,
      colorDark:'#1A0F2E',colorLight:'#ffffff',
      correctLevel:QRCode.CorrectLevel.M
    });
  }catch(e){
    document.getElementById('qr-box').innerHTML='<span style="font-size:10px;color:#333;padding:4px">'+pUrl+'</span>';
  }
  set(ref(db,`${SESSION}/session`),{active:true,playerUrl:pUrl,started:false});
}

/* ── SIDEBAR ── */
function updateSidebar(){
  const sorted=Object.entries(players).sort((a,b)=>(b[1].score||0)-(a[1].score||0));
  const list=document.getElementById('sb-list');
  if(!sorted.length){list.innerHTML='<div class="sb-empty">ממתין לשחקנים...</div>';return;}
  list.innerHTML=sorted.map(([id,p],i)=>`
    <div class="sb-row ${i===0?'top1':''}">
      <span class="sb-rank">${['🥇','🥈','🥉'][i]||('#'+(i+1))}</span>
      <span style="font-size:16px">${p.emoji||'🙂'}</span>
      <span class="sb-name">${p.name}</span>
      <span class="sb-pts">${p.score||0}</span>
    </div>`).join('');
}

/* ── WHEEL ── */
function drawWheel(angle){
  const c=document.getElementById('wheel-canvas');
  const ctx=c.getContext('2d');
  const cx=150,cy=150,r=142;
  const arc=2*Math.PI/CATS.length;
  ctx.clearRect(0,0,300,300);
  CATS.forEach((cat,i)=>{
    const s=angle+i*arc-Math.PI/2,e=s+arc;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,s,e);ctx.closePath();
    ctx.fillStyle=WCOLORS[i];ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=2;ctx.stroke();
    ctx.save();ctx.translate(cx,cy);ctx.rotate(s+arc/2);
    ctx.textAlign='right';ctx.fillStyle='#fff';
    ctx.font='bold 11px Heebo,sans-serif';
    ctx.fillText(cat,r-10,4);ctx.restore();
  });
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,24);
  g.addColorStop(0,'#FF9A3C');g.addColorStop(1,'#6B21A8');
  ctx.beginPath();ctx.arc(cx,cy,24,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
}

function spinWheel(){
  if(spinning)return;
  const avail=QUESTIONS.filter((_,i)=>!usedQs.has(i));
  if(!avail.length){endGame();return;}
  spinning=true;
  document.getElementById('spin-btn').disabled=true;
  document.getElementById('wheel-result').innerHTML='';
  const ri=Math.floor(Math.random()*avail.length);
  const qGlobal=QUESTIONS.indexOf(avail[ri]);
  const q=avail[ri];
  const catIdx=CATS.indexOf(q.cat);
  const target=-(catIdx*(2*Math.PI/CATS.length));
  const turns=4+Math.random()*3;
  const end=target-turns*2*Math.PI+Math.random()*.2-.1;
  const start0=wheelAngle,dur=3500,t0=performance.now();
  function anim(now){
    const t=Math.min((now-t0)/dur,1);
    const ease=1-Math.pow(1-t,4);
    wheelAngle=start0+(end-start0)*ease;
    drawWheel(wheelAngle);
    if(t<1){requestAnimationFrame(anim);}
    else{
      spinning=false;
      document.getElementById('wheel-result').innerHTML=`נבחר: <span>${q.cat} | ${q.pts} נק׳</span>`;
      setTimeout(()=>{ usedQs.add(qGlobal); showQuestion(q); },1000);
    }
  }
  requestAnimationFrame(anim);
}

/* ── QUESTION ── */
function showQuestion(q){
  currentQ=q; playerAnswers={}; revealed=false;
  clearInterval(timerInt);
  switchScreen('q-screen');
  document.getElementById('q-cat').textContent=q.cat;
  document.getElementById('q-pts').textContent=q.pts+' נק׳';
  document.getElementById('q-text').textContent=q.text;
  document.getElementById('q-stats').style.display='none';
  document.getElementById('q-expl').style.display='none';
  document.getElementById('answered-count').style.display='none';
  document.getElementById('reveal-btn').style.display='inline-flex';
  document.getElementById('next-btn').style.display='none';
  const num=usedQs.size;
  document.getElementById('st-q').textContent=`${num}/16`;
  document.getElementById('prog-fill').style.width=`${(num/16)*100}%`;
  document.getElementById('prog-lbl').textContent=`שאלה ${num} מתוך 16`;

  // Image + hotspots
  const imgWrap=document.getElementById('q-imgwrap');
  if(q.img){
    imgWrap.style.display='block';
    document.getElementById('q-img').src=q.img;
    imgWrap.querySelectorAll('.hotspot').forEach(h=>h.remove());
    if(q.type==='hotspot'&&q.hotspots){
      q.hotspots.forEach(h=>{
        const b=document.createElement('button');
        b.className='hotspot';
        b.style.left=h.x+'%';
        b.style.top=h.y+'%';
        b.innerHTML='❓';
        b.title=h.lbl;
        b.onclick=()=>{
          if(b.dataset.f==='1')return;
          b.dataset.f='1';
          b.classList.add('found');
          b.innerHTML='✅';
          showNotif('נמצא: '+h.lbl);
        };
        imgWrap.appendChild(b);
      });
    }
  } else {
    imgWrap.style.display='none';
  }

  // Answers
  const wrap=document.getElementById('q-answers');
  wrap.innerHTML='';
  wrap.className=q.type==='tf'?'qanswers tf':'qanswers';
  if(q.type!=='hotspot'){
    const lts=['א','ב','ג','ד'];
    q.opts.forEach((o,i)=>{
      const b=document.createElement('button');
      b.className='abtn'; b.dataset.i=i;
      b.innerHTML=`<span class="ltr">${lts[i]}</span> ${o}`;
      wrap.appendChild(b);
    });
  }

  // Push to Firebase
  set(ref(db,`${SESSION}/currentQ`),{
    cat:q.cat,pts:q.pts,type:q.type,text:q.text,
    opts:q.opts||null,correct:q.correct,
    img:q.img||null,hotspots:q.hotspots||null,
    expl:q.expl,qId:Date.now()
  });
  remove(ref(db,`${SESSION}/answers`));
  remove(ref(db,`${SESSION}/correct`));
  set(ref(db,`${SESSION}/gameState`),'question');

  timeLeft=30; updateTimer();
  timerInt=setInterval(()=>{
    timeLeft--;updateTimer();
    if(timeLeft<=0){clearInterval(timerInt);revealAnswer();}
  },1000);
}

function updateTimer(){
  const el=document.getElementById('q-timer');
  el.textContent=timeLeft;
  el.className='qtimer'+(timeLeft<=10?' urg':'');
}

/* ── REVEAL ── */
function revealAnswer(){
  if(revealed)return;
  revealed=true;
  clearInterval(timerInt);
  document.getElementById('reveal-btn').style.display='none';
  document.getElementById('next-btn').style.display='inline-flex';
  document.getElementById('answered-count').style.display='none';
  const q=currentQ;
  document.querySelectorAll('.abtn').forEach((b,i)=>{
    if(i===q.correct) b.classList.add('correct');
    else b.classList.add('wrong');
  });
  if(q.type!=='hotspot'){
    const bar=document.getElementById('q-stats');
    bar.style.display='block';
    const counts=(q.opts||[]).map((_,i)=>
      Object.values(playerAnswers).filter(a=>a.answer===i).length);
    const total=Object.values(playerAnswers).length||1;
    const lts=['א','ב','ג','ד'];
    document.getElementById('stat-bars').innerHTML=counts.map((c,i)=>`
      <div class="stat-row">
        <div class="stat-lbl">${lts[i]}</div>
        <div class="stat-bar"><div class="stat-fill ${i===q.correct?'ck':''}" style="width:${Math.round((c/total)*100)}%"></div></div>
        <div class="stat-cnt">${c}</div>
      </div>`).join('');
  }
  document.getElementById('q-expl').innerHTML=`<strong>💡 הסבר:</strong> ${q.expl}`;
  document.getElementById('q-expl').style.display='block';
  scoreRound(q);
  set(ref(db,`${SESSION}/gameState`),'reveal');
  set(ref(db,`${SESSION}/correct`),q.correct);
}

/* ── SCORING ── */
function scoreRound(q){
  const updates={};
  Object.entries(playerAnswers).forEach(([id,data])=>{
    if(data.answer===q.correct){
      const elapsed=data.elapsed||20000;
      const bonus=Math.floor(Math.max(0,(1-elapsed/30000))*q.pts*0.5);
      const pts=q.pts+bonus;
      const current=players[id]?.score||0;
      updates[`${SESSION}/players/${id}/score`]=current+pts;
    }
  });
  if(Object.keys(updates).length) update(ref(db,'/'),updates);
}

/* ── NEXT / SCORES / END ── */
function nextQuestion(){
  const avail=QUESTIONS.filter((_,i)=>!usedQs.has(i));
  if(!avail.length){endGame();return;}
  switchScreen('wheel-screen');
  document.getElementById('spin-btn').disabled=false;
  document.getElementById('spin-btn').textContent='🎡 סובב!';
  document.getElementById('wheel-result').innerHTML='';
  document.getElementById('wheel-hdr').textContent=`${usedQs.size} עברו · ${avail.length} נותרו`;
  set(ref(db,`${SESSION}/gameState`),'wheel');
}

function showScores(){
  switchScreen('scores-screen');
  renderScores('scores-grid');
}

function continueGame(){
  const avail=QUESTIONS.filter((_,i)=>!usedQs.has(i));
  if(!avail.length){endGame();return;}
  switchScreen('wheel-screen');
  set(ref(db,`${SESSION}/gameState`),'wheel');
}

function renderScores(elId){
  const sorted=Object.entries(players).sort((a,b)=>(b[1].score||0)-(a[1].score||0));
  document.getElementById(elId).innerHTML=sorted.map(([id,p],i)=>`
    <div class="score-row ${['t1','t2','t3'][i]||''}" style="animation-delay:${i*.07}s">
      <div class="score-medal">${['🥇','🥈','🥉'][i]||'#'+(i+1)}</div>
      <div class="score-em">${p.emoji||'🙂'}</div>
      <div class="score-name">${p.name}</div>
      <div class="score-pts">${p.score||0}</div>
    </div>`).join('');
}

function endGame(){
  clearInterval(timerInt);
  switchScreen('end-screen');
  set(ref(db,`${SESSION}/gameState`),'end');
  const sorted=Object.entries(players).sort((a,b)=>(b[1].score||0)-(a[1].score||0));
  if(sorted.length){
    const [,wp]=sorted[0];
    document.getElementById('w-em').textContent=wp.emoji||'🥇';
    document.getElementById('w-name').textContent=wp.name;
    document.getElementById('w-pts').textContent=(wp.score||0)+' נקודות';
  }
  renderScores('final-grid');
}

function resetGame(){
  remove(ref(db,SESSION)).then(()=>location.reload());
}

/* ── START ── */
function startGame(){
  gameStarted=true;
  document.getElementById('lobby').style.display='none';
  document.getElementById('game').style.display='flex';
  document.getElementById('game').style.flexDirection='column';
  switchScreen('wheel-screen');
  drawWheel(0);
  set(ref(db,`${SESSION}/session/started`),true);
  set(ref(db,`${SESSION}/gameState`),'wheel');
  showNotif('🎮 המשחק התחיל!');
}

/* ── UTILS ── */
function switchScreen(id){
  ['wheel-screen','q-screen','scores-screen','end-screen'].forEach(s=>{
    const el=document.getElementById(s);
    el.style.display=el.id===id?'flex':'none';
    if(el.id===id) el.style.flexDirection='column';
  });
}

function showNotif(msg){
  const el=document.getElementById('notif');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

/* ── EXPOSE FOR onclick ── */
window.startGame=startGame;
window.resetGame=resetGame;
window.spinWheel=spinWheel;
window.revealAnswer=revealAnswer;
window.nextQuestion=nextQuestion;
window.showScores=showScores;
window.continueGame=continueGame;

/* ── INIT ── */
setupQR();
drawWheel(0);
</script>
