<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>הבית הבטוח | שחקן</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;800;900&family=Secular+One&display=swap" rel="stylesheet">
</head>
<body>

<!-- JOIN -->
<div id="join-screen" class="screen active">
  <div class="join-icon">🏠</div>
  <div class="join-title">הבית הבטוח</div>
  <div class="join-sub">בחרו אמוג׳י ושם כדי להצטרף!</div>
  <div class="section-label">בחרו אמוג׳י</div>
  <div class="emoji-grid" id="emoji-grid"></div>
  <div class="section-label">השם שלך</div>
  <input id="name-in" class="name-input" type="text" placeholder="הכניסי שם..." maxlength="16">
  <button id="join-btn" class="big-btn" disabled>🎮 הצטרפי למשחק</button>
</div>

<!-- WAIT -->
<div id="wait-screen" class="screen">
  <div class="wait-ring"></div>
  <div id="wa" class="wait-avatar">😊</div>
  <div id="wn" class="wait-name">שמי</div>
  <div class="wait-msg">ממתינים שהמנחה יתחיל...<br>🎯 שבו בנוח!</div>
  <div class="score-card">
    <div id="ws" class="score-big">0</div>
    <div class="score-lbl">נקודות</div>
  </div>
</div>

<!-- QUESTION -->
<div id="q-screen" class="screen">
  <div class="q-top">
    <div id="p-cat" class="badge badge-or">קטגוריה</div>
    <div id="p-pts" class="badge badge-pu">נק׳</div>
    <div id="p-timer" class="timer">30</div>
  </div>
  <div class="my-score-row">
    <span class="msl">הניקוד שלי</span>
    <span id="p-score" class="msv">0</span>
  </div>
  <div id="p-text" class="q-text"></div>
  <div id="p-imgwrap" class="img-wrap" style="display:none">
    <img id="p-img" class="q-img" src="" alt="">
    <!-- hotspots injected here by JS -->
  </div>
  <div id="hotspot-hint" class="hotspot-hint" style="display:none">🔍 מצאו את הסכנות בתמונה — לחצו עליהן! &nbsp;✅ <span id="hs-found">0</span>/<span id="hs-total">0</span></div>
  <div id="p-answers" class="answers-wrap"></div>
  <div id="p-feedback" style="display:none"></div>
  <div id="p-expl" class="expl-box" style="display:none"></div>
</div>

<!-- END -->
<div id="end-screen" class="screen">
  <div id="end-av" class="end-avatar">🏆</div>
  <div class="end-title">המשחק הסתיים!</div>
  <div id="end-sc" class="end-score">0</div>
  <div class="end-lbl">נקודות סופיות</div>
  <button class="big-btn" id="play-again-btn">🔄 שחק שוב</button>
</div>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--or:#FF6B00;--orl:#FF9A3C;--og:rgba(255,107,0,.4);--pm:#9333EA;--pl:#C084FC;--dark:#0F0A1A;--pan:#1A0F2E;--pan2:#231540;--gold:#FFD700;--ok:#00CC6A;--err:#FF4444}
html,body{height:100%;font-size:16px;overflow-x:hidden}
body{font-family:'Heebo',sans-serif;background:var(--dark);color:#fff;direction:rtl;min-height:100svh;
  background-image:radial-gradient(ellipse at 30% 0%,rgba(107,33,168,.3),transparent 55%),radial-gradient(ellipse at 70% 100%,rgba(255,107,0,.2),transparent 55%)}
.screen{display:none;flex-direction:column;align-items:center;min-height:100svh;padding:20px 16px 32px;gap:14px;overflow-y:auto;text-align:center}
.screen.active{display:flex}

/* JOIN */
.join-icon{font-size:56px;line-height:1;margin-top:12px}
.join-title{font-family:'Secular One',sans-serif;font-size:clamp(28px,8vw,40px);background:linear-gradient(135deg,var(--orl),var(--pl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.join-sub{font-size:14px;color:rgba(255,255,255,.5)}
.section-label{font-size:11px;font-weight:800;color:var(--orl);letter-spacing:.18em;text-transform:uppercase;width:100%;max-width:320px;text-align:right}
.emoji-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;width:100%;max-width:320px}
.emoji-btn{font-size:28px;padding:9px 6px;border-radius:12px;border:2px solid rgba(147,51,234,.2);background:var(--pan);cursor:pointer;transition:all .15s;line-height:1}
.emoji-btn.sel{border-color:var(--or);background:rgba(255,107,0,.15);transform:scale(1.1)}
.name-input{width:100%;max-width:320px;padding:16px;background:var(--pan);border:2px solid rgba(147,51,234,.3);border-radius:14px;color:#fff;font-family:'Heebo',sans-serif;font-size:18px;font-weight:700;text-align:right;outline:none;transition:border-color .2s}
.name-input:focus{border-color:var(--or)}
.name-input::placeholder{color:rgba(255,255,255,.22)}
.big-btn{width:100%;max-width:320px;padding:18px;border:none;border-radius:15px;font-family:'Heebo',sans-serif;font-size:19px;font-weight:900;cursor:pointer;background:linear-gradient(135deg,var(--or),var(--orl));color:#fff;box-shadow:0 0 24px var(--og);transition:all .2s}
.big-btn:disabled{opacity:.4;cursor:not-allowed}
.big-btn:not(:disabled):active{transform:scale(.97)}

/* WAIT */
.wait-ring{width:80px;height:80px;border-radius:50%;border:3px solid var(--pm);animation:ring 2s ease infinite;margin-top:20px}
@keyframes ring{0%{transform:scale(.8);opacity:1}100%{transform:scale(1.8);opacity:0}}
.wait-avatar{font-size:60px;animation:bob 2s ease infinite;margin-top:-70px}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.wait-name{font-family:'Secular One',sans-serif;font-size:24px;color:var(--orl)}
.wait-msg{font-size:14px;color:rgba(255,255,255,.45);line-height:1.6}
.score-card{background:var(--pan);border:1px solid rgba(147,51,234,.25);border-radius:18px;padding:16px 32px;display:flex;flex-direction:column;align-items:center;gap:4px}
.score-big{font-family:'Secular One',sans-serif;font-size:48px;color:var(--gold);text-shadow:0 0 16px rgba(255,215,0,.4)}
.score-lbl{font-size:12px;color:rgba(255,255,255,.4)}

/* QUESTION */
#q-screen{text-align:right;align-items:stretch}
.q-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.badge{padding:7px 14px;border-radius:22px;font-size:12px;font-weight:800;white-space:nowrap}
.badge-or{background:linear-gradient(135deg,var(--or),var(--orl));color:#fff}
.badge-pu{background:linear-gradient(135deg,var(--pm),var(--pl));color:#fff}
.timer{font-family:'Secular One',sans-serif;font-size:40px;color:var(--gold);text-shadow:0 0 14px rgba(255,215,0,.5);min-width:50px;text-align:center;line-height:1}
.timer.urg{color:var(--err);animation:tpulse .5s infinite alternate}
@keyframes tpulse{from{transform:scale(1)}to{transform:scale(1.1)}}
.my-score-row{display:flex;align-items:center;justify-content:space-between;background:var(--pan);border:1px solid rgba(147,51,234,.2);border-radius:12px;padding:10px 16px}
.msl{font-size:12px;color:rgba(255,255,255,.45)}
.msv{font-family:'Secular One',sans-serif;font-size:22px;color:var(--gold)}
.q-text{font-family:'Secular One',sans-serif;font-size:clamp(17px,5vw,22px);line-height:1.45;text-align:center;padding:16px;background:var(--pan);border-radius:15px;border:1px solid rgba(147,51,234,.25)}

/* IMAGE + HOTSPOTS */
.img-wrap{position:relative;width:100%;border-radius:14px;overflow:hidden}
.q-img{width:100%;max-height:220px;object-fit:cover;display:block}
.hotspot-btn{
  position:absolute;
  width:60px;height:60px;
  border-radius:50%;
  border:none;
  background:transparent;
  display:flex;align-items:center;justify-content:center;
  font-size:0;cursor:crosshair;
  transition:all .2s;
  transform:translate(-50%,-50%);
  -webkit-tap-highlight-color:transparent;
}
.hotspot-btn:active{background:rgba(255,107,0,.15);}
.hotspot-btn.found{
  border:3px solid var(--ok);
  background:rgba(0,204,106,.3);
  font-size:20px;
  cursor:default;
  transform:translate(-50%,-50%) scale(1.05);
  animation:none;
}
.hotspot-btn:disabled{cursor:default}
.hotspot-hint{text-align:center;font-size:14px;font-weight:700;color:rgba(255,255,255,.6);padding:6px;background:var(--pan);border-radius:10px;border:1px solid rgba(147,51,234,.2)}

/* ANSWERS */
.answers-wrap{display:flex;flex-direction:column;gap:10px}
.ans-btn{width:100%;padding:18px 16px;border:2px solid rgba(147,51,234,.25);border-radius:15px;background:var(--pan2);color:#fff;font-family:'Heebo',sans-serif;font-size:clamp(16px,4.5vw,19px);font-weight:700;cursor:pointer;transition:all .18s;text-align:right;display:flex;align-items:center;gap:12px;min-height:60px;line-height:1.3}
.ans-ltr{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:10px;flex-shrink:0;background:rgba(255,107,0,.15);color:var(--orl);font-size:15px;font-weight:900}
.ans-btn:not(.done):hover{border-color:var(--pm);background:rgba(147,51,234,.15)}
.ans-btn.sel{border-color:var(--or);background:rgba(255,107,0,.12)}
.ans-btn.done{cursor:default;pointer-events:none}
.ans-btn.correct-a{border-color:var(--ok)!important;background:rgba(0,204,106,.12)!important;color:var(--ok)}
.ans-btn.wrong-a{border-color:var(--err)!important;opacity:.45}

/* FEEDBACK */
.feedback{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px;border-radius:16px;width:100%}
.fb-ok{background:rgba(0,204,106,.1);border:1px solid var(--ok)}
.fb-err{background:rgba(255,68,68,.1);border:1px solid var(--err)}
.fb-time{background:rgba(255,215,0,.08);border:1px solid var(--gold)}
.fb-icon{font-size:38px}
.fb-title{font-family:'Secular One',sans-serif;font-size:21px}
.fb-pts{font-family:'Secular One',sans-serif;font-size:30px;color:var(--gold)}
.fb-hint{font-size:12px;color:rgba(255,255,255,.5)}
.expl-box{background:linear-gradient(135deg,rgba(255,107,0,.07),rgba(147,51,234,.07));border:1px solid rgba(255,107,0,.3);border-radius:12px;padding:13px 15px;font-size:14px;line-height:1.6;text-align:right}
.expl-box strong{color:var(--orl)}

/* END */
.end-avatar{font-size:68px;margin-top:20px}
.end-title{font-family:'Secular One',sans-serif;font-size:30px;background:linear-gradient(135deg,var(--or),var(--pl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.end-score{font-family:'Secular One',sans-serif;font-size:68px;color:var(--gold);text-shadow:0 0 22px rgba(255,215,0,.4)}
.end-lbl{font-size:14px;color:rgba(255,255,255,.4)}
</style>

<script type="module">
import { initializeApp }                 from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, remove,
         onValue, onDisconnect, get }    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const app = initializeApp({
  apiKey:'AIzaSyA2_sajeisUbl0S3hePbxfcZMKHnfO8mX8',
  authDomain:'hb-ergonomics.firebaseapp.com',
  databaseURL:'https://hb-ergonomics-default-rtdb.firebaseio.com/',
  projectId:'hb-ergonomics',
  storageBucket:'hb-ergonomics.firebasestorage.app',
  messagingSenderId:'999618112514',
  appId:'1:999618112514:web:0c9da1f0b448a28aa48b1b'
});
const db = getDatabase(app);

const EMOJIS = ['😊','🎯','⚡','🔥','💜','🌟','🦁','🚀','🏆','🎮'];
let myEmoji='😊', myName='', myScore=0;
let myId='p_'+Math.random().toString(36).slice(2,9);
let SESSION=null, currentQ=null, answered=false, startTime=0;
let timerInt=null, timeLeft=30, lastQId=null;
let hsFound=0, hsTotal=0;

/* EMOJI GRID */
const grid=document.getElementById('emoji-grid');
EMOJIS.forEach((em,i)=>{
  const btn=document.createElement('button');
  btn.className='emoji-btn'+(i===0?' sel':'');
  btn.textContent=em;
  btn.onclick=()=>{
    document.querySelectorAll('.emoji-btn').forEach(b=>b.classList.remove('sel'));
    btn.classList.add('sel'); myEmoji=em;
  };
  grid.appendChild(btn);
});

/* NAME / JOIN */
const nameIn=document.getElementById('name-in');
nameIn.addEventListener('input',()=>{ document.getElementById('join-btn').disabled=nameIn.value.trim().length<2; });
nameIn.addEventListener('keydown',e=>{ if(e.key==='Enter') tryJoin(); });
document.getElementById('join-btn').onclick=tryJoin;

function tryJoin(){
  myName=nameIn.value.trim();
  if(myName.length<2) return;
  SESSION=new URLSearchParams(location.search).get('s');
  if(!SESSION){ alert('קישור לא תקין. בקשי קישור חדש מהמנחה.'); return; }
  document.getElementById('wa').textContent=myEmoji;
  document.getElementById('wn').textContent=myName;
  showScreen('wait-screen');
  const pRef=ref(db,`${SESSION}/players/${myId}`);
  set(pRef,{name:myName,emoji:myEmoji,score:0});
  onDisconnect(pRef).remove();
  listenGame();
}

/* LISTENERS */
function listenGame(){
  onValue(ref(db,`${SESSION}/players/${myId}/score`),snap=>{
    myScore=snap.val()||0;
    document.getElementById('ws').textContent=myScore;
    document.getElementById('p-score').textContent=myScore;
  });
  onValue(ref(db,`${SESSION}/gameState`),snap=>{
    const state=snap.val();
    if(state==='wheel') showScreen('wait-screen');
    if(state==='end')   endGame();
  });
  onValue(ref(db,`${SESSION}/currentQ`),snap=>{
    const q=snap.val();
    if(!q) return;
    if(lastQId===q.qId) return;
    lastQId=q.qId;
    showQuestion(q);
  });
  onValue(ref(db,`${SESSION}/correct`),snap=>{
    const c=snap.val();
    if(c===null||c===undefined) return;
    if(currentQ) doReveal(c);
  });
}

/* QUESTION */
function showQuestion(q){
  currentQ=q; answered=false; startTime=Date.now();
  hsFound=0; hsTotal=q.hotspots?q.hotspots.length:0;
  clearInterval(timerInt);
  showScreen('q-screen');

  document.getElementById('p-cat').textContent=q.cat||'';
  document.getElementById('p-pts').textContent=(q.pts||0)+' נק׳';
  document.getElementById('p-text').textContent=q.text||'';
  document.getElementById('p-feedback').style.display='none';
  document.getElementById('p-expl').style.display='none';
  document.getElementById('p-score').textContent=myScore;

  /* Image */
  const imgWrap=document.getElementById('p-imgwrap');
  const hintEl=document.getElementById('hotspot-hint');
  imgWrap.querySelectorAll('.hotspot-btn').forEach(h=>h.remove());

  if(q.img){
    imgWrap.style.display='block';
    document.getElementById('p-img').src=q.img;

    if(q.type==='hotspot'&&q.hotspots){
      hintEl.style.display='block';
      document.getElementById('hs-found').textContent=0;
      document.getElementById('hs-total').textContent=q.hotspots.length;

      q.hotspots.forEach((h,i)=>{
        const btn=document.createElement('button');
        btn.className='hotspot-btn';
        btn.style.left=h.x+'%';
        btn.style.top=h.y+'%';
        btn.innerHTML='❓';
        btn.dataset.idx=i;
        btn.onclick=()=>{
          if(btn.classList.contains('found')) return;
          btn.classList.add('found');
          btn.innerHTML='✅';
          hsFound++;
          document.getElementById('hs-found').textContent=hsFound;
          // Award points
          const pts=Math.floor((q.pts||100)/q.hotspots.length);
          get(ref(db,`${SESSION}/players/${myId}/score`)).then(snap=>{
            set(ref(db,`${SESSION}/players/${myId}/score`),(snap.val()||0)+pts);
          });
          // Report to Firebase
          set(ref(db,`${SESSION}/answers/${myId}_hs${i}`),{hotspot:i,lbl:h.lbl,elapsed:Date.now()-startTime});
          if(hsFound===hsTotal){
            // All found!
            const fb=document.getElementById('p-feedback');
            fb.style.display='block';
            fb.innerHTML='<div class="feedback fb-ok"><span class="fb-icon">🎉</span><div class="fb-title">מצאת את כולן!</div></div>';
          }
        };
        imgWrap.appendChild(btn);
      });
    } else {
      hintEl.style.display='none';
    }
  } else {
    imgWrap.style.display='none';
    hintEl.style.display='none';
  }

  /* Answer buttons */
  const wrap=document.getElementById('p-answers');
  wrap.innerHTML='';
  const lts=['א','ב','ג','ד'];
  if(q.type!=='hotspot'&&q.opts){
    q.opts.forEach((o,i)=>{
      const b=document.createElement('button');
      b.className='ans-btn';
      b.innerHTML=`<span class="ans-ltr">${lts[i]}</span><span>${o}</span>`;
      b.onclick=()=>selectAnswer(b,i);
      wrap.appendChild(b);
    });
  }

  /* Timer */
  timeLeft=30; updateTimer();
  timerInt=setInterval(()=>{
    timeLeft--;updateTimer();
    if(timeLeft<=0){
      clearInterval(timerInt);
      if(!answered&&q.type!=='hotspot') timeOut();
    }
  },1000);
}

function updateTimer(){
  const el=document.getElementById('p-timer');
  el.textContent=timeLeft;
  el.className='timer'+(timeLeft<=10?' urg':'');
}

function selectAnswer(btn,idx){
  if(answered) return;
  answered=true;
  clearInterval(timerInt);
  const elapsed=Date.now()-startTime;
  document.querySelectorAll('.ans-btn').forEach(b=>b.classList.add('done'));
  btn.classList.add('sel');
  set(ref(db,`${SESSION}/answers/${myId}`),{answer:idx,elapsed});
}

function doReveal(correct){
  clearInterval(timerInt);
  const btns=document.querySelectorAll('.ans-btn');
  btns.forEach((b,i)=>{
    if(i===correct) b.classList.add('correct-a');
    else if(b.classList.contains('sel')) b.classList.add('wrong-a');
    b.classList.add('done');
  });
  // Disable all hotspot buttons
  document.querySelectorAll('.hotspot-btn').forEach(b=>b.disabled=true);

  const selBtn=document.querySelector('.ans-btn.sel');
  const selIdx=selBtn?Array.from(btns).indexOf(selBtn):-1;
  if(!answered) answered=true;
  if(btns.length>0) showFeedback(selIdx===correct,selIdx,correct);
  showExpl();
}

function showFeedback(ok,sel,correct){
  const fb=document.getElementById('p-feedback');
  fb.style.display='block';
  if(ok){
    const elapsed=Date.now()-startTime;
    const bonus=Math.floor(Math.max(0,(1-elapsed/30000))*(currentQ.pts||100)*0.5);
    fb.innerHTML=`<div class="feedback fb-ok"><span class="fb-icon">✅</span><div class="fb-title">נכון!</div><span class="fb-pts">+${(currentQ.pts||0)+bonus}</span><div class="fb-hint">כולל בונוס מהירות 🚀</div></div>`;
  } else if(sel===-1){
    // timeout
  } else {
    fb.innerHTML=`<div class="feedback fb-err"><span class="fb-icon">❌</span><div class="fb-title">לא נכון</div></div>`;
  }
}

function timeOut(){
  answered=true;
  const fb=document.getElementById('p-feedback');
  fb.style.display='block';
  fb.innerHTML=`<div class="feedback fb-time"><span class="fb-icon">⏰</span><div class="fb-title">הזמן נגמר!</div></div>`;
}

function showExpl(){
  if(!currentQ||!currentQ.expl) return;
  const el=document.getElementById('p-expl');
  el.innerHTML=`<strong>💡 הסבר:</strong> ${currentQ.expl}`;
  el.style.display='block';
}

function endGame(){
  clearInterval(timerInt);
  showScreen('end-screen');
  document.getElementById('end-sc').textContent=myScore;
  document.getElementById('end-av').textContent=myScore>500?'🏆':myScore>200?'🎯':'💪';
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>{
    s.classList.remove('active');
    s.style.display='none';
  });
  const el=document.getElementById(id);
  el.style.display='flex';
  el.classList.add('active');
}

document.getElementById('play-again-btn').onclick=()=>location.reload();
</script>
</body>
</html>
